<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secret Wall</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
    font-family: Arial, sans-serif;
    max-width:800px;
    margin:auto;
    padding:20px;
    background:#f5f5f5;
}

h1{
    text-align:center;
}

textarea{
    width:100%;
    height:120px;
    padding:10px;
    font-size:16px;
}

button{
    margin-top:10px;
    padding:12px 20px;
    font-size:16px;
    cursor:pointer;
}

.message{
    background:white;
    padding:15px;
    margin-top:10px;
    border-radius:10px;
    box-shadow:0 2px 5px rgba(0,0,0,.1);
}
</style>
</head>
<body>

<h1>🕵️ Secret Wall</h1>

<textarea id="message" placeholder="Напиши секрет..."></textarea>
<br>
<button onclick="sendMessage()">Отправить</button>

<h2>Сообщения</h2>

<div id="messages"></div>

<script>

const supabase = window.supabase.createClient(
    "https://mwirdbtzjrzeegygfxqo.supabase.co/rest/v1/",
    "sb_publishable_364IFmxNgYHi8aHnOiaCBA_HoaJLfXg"
);

async function sendMessage(){

    const text = document.getElementById("message").value.trim();

    if(!text){
        alert("Напиши сообщение");
        return;
    }

    const { error } = await supabase
        .from("secret wall")
        .insert([
            { text:text }
        ]);

    if(error){
        alert(error.message);
        return;
    }

    document.getElementById("message").value="";
    loadMessages();
}

async function loadMessages(){

    const { data, error } = await supabase
        .from("secret wall")
        .select("*")
        .order("created_at",{ascending:false});

    if(error){
        console.log(error);
        return;
    }

    const container=document.getElementById("messages");

    container.innerHTML="";

    data.forEach(item=>{

        const div=document.createElement("div");

        div.className="message";

        div.textContent=item.text;

        container.appendChild(div);

    });
}

loadMessages();

</script>

</body>
</html>
